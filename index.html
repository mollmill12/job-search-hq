<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Search HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; background: #0d0216; color: #f0e6ff; min-height: 100vh; }
  #header { background: linear-gradient(135deg, #1a0030 0%, #2d0050 60%, #1a0030 100%); padding: 24px 32px 0; box-shadow: 0 4px 40px rgba(255,0,220,0.2); border-bottom: 1px solid rgba(255,107,255,0.2); }
  #header-inner { max-width: 1200px; margin: 0 auto; }
  #header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  #header-top h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 700; color: #ff6bff; letter-spacing: -0.01em; text-shadow: 0 0 20px rgba(255,107,255,0.6); }
  #header-top p { font-size: 13px; color: rgba(255,180,255,0.5); margin-top: 4px; }
  #stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .stat-box { background: rgba(255,0,220,0.07); border: 1px solid rgba(255,0,220,0.2); border-radius: 10px; padding: 8px 16px; text-align: center; }
  .stat-box .val { font-size: 22px; font-weight: 700; color: #ff6bff; text-shadow: 0 0 12px rgba(255,107,255,0.7); }
  .stat-box .val.alert { color: #ff3aff; text-shadow: 0 0 12px rgba(255,58,255,0.9); }
  .stat-box .lbl { font-size: 11px; color: rgba(255,160,255,0.5); letter-spacing: 0.06em; text-transform: uppercase; }
  #email-btn { background: linear-gradient(135deg, rgba(255,0,220,0.18), rgba(180,0,255,0.18)); color: #ff6bff; border: 1px solid rgba(255,0,220,0.35); border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  #tabs { display: flex; margin-top: 20px; }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 10px 20px; font-size: 14px; font-weight: 400; color: rgba(255,160,255,0.4); border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit; }
  .tab-btn.active { font-weight: 600; color: #ff6bff; border-bottom-color: #ff00dd; text-shadow: 0 0 10px rgba(255,107,255,0.5); }
  #content { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
  .inp { width: 100%; padding: 9px 12px; border: 1.5px solid rgba(255,0,220,0.25); border-radius: 8px; font-size: 14px; font-family: inherit; color: #f0e6ff; background: rgba(255,0,220,0.05); outline: none; }
  .inp:focus { border-color: #ff00dd; box-shadow: 0 0 8px rgba(255,0,221,0.3); }
  textarea.inp { resize: vertical; }
  .inp option { background: #1a0030; color: #f0e6ff; }
  .btn-primary { background: linear-gradient(135deg, #cc00bb, #ff00dd); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 0 14px rgba(255,0,221,0.4); }
  .btn-secondary { background: rgba(255,0,220,0.1); color: #ff6bff; border: 1px solid rgba(255,0,220,0.25); border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-danger { background: rgba(255,50,50,0.12); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.25); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-icon { background: rgba(255,0,220,0.1); color: #ff6bff; border: 1px solid rgba(255,0,220,0.2); border-radius: 6px; padding: 5px 9px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,160,255,0.6); margin-bottom: 6px; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .pipeline-list { display: flex; flex-direction: column; gap: 8px; }
  .pipeline-row { background: rgba(255,0,220,0.04); border-radius: 12px; padding: 16px 20px; border: 1px solid rgba(255,0,220,0.15); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; cursor: pointer; transition: all 0.15s; }
  .pipeline-row:hover { border-color: rgba(255,0,220,0.4); box-shadow: 0 0 16px rgba(255,0,220,0.12); }
  .pipeline-row.needs-update { border: 1.5px dashed rgba(255,180,0,0.4); }
  .pipeline-row .co-name { font-weight: 700; font-size: 15px; color: #f0e6ff; }
  .pipeline-row .co-title { font-size: 13px; color: rgba(255,160,255,0.6); margin-top: 2px; }
  .pipeline-row .co-title.warn { color: #ffb347; }
  .pipeline-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .pipeline-tag { border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .tag-pink { background: rgba(255,0,220,0.15); color: #ff6bff; border: 1px solid rgba(255,0,220,0.2); }
  .tag-amber { background: rgba(255,180,0,0.12); color: #ffb347; border: 1px solid rgba(255,180,0,0.2); }
  .pipeline-actions { display: flex; gap: 6px; }
  #kanban-hint { background: rgba(255,180,0,0.07); border: 1px solid rgba(255,180,0,0.2); border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: #ffb347; display: flex; align-items: center; gap: 8px; }
  #kanban-tip { font-size: 13px; color: rgba(255,160,255,0.4); margin-bottom: 16px; }
  #kanban-board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; }
  .kanban-col { min-width: 200px; max-width: 220px; flex-shrink: 0; background: rgba(255,0,220,0.04); border-radius: 14px; padding: 12px 10px; border: 2px dashed transparent; transition: all 0.14s; min-height: 120px; }
  .kanban-col.drag-over { border-color: var(--col-dot); background: var(--col-bg); }
  .kanban-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
  .kanban-col-title { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .kanban-col-count { font-size: 11px; font-weight: 700; color: rgba(255,160,255,0.4); background: rgba(255,0,220,0.1); border-radius: 10px; padding: 1px 7px; }
  .kanban-cards { display: flex; flex-direction: column; gap: 8px; }
  .kanban-empty { text-align: center; padding: 20px 8px; font-size: 12px; color: rgba(255,160,255,0.25); font-style: italic; }
  .kanban-card { background: rgba(30,0,50,0.8); border-radius: 10px; padding: 12px; cursor: grab; border: 1px solid rgba(255,0,220,0.15); transition: all 0.13s; user-select: none; }
  .kanban-card:hover { border-color: rgba(255,0,220,0.4); box-shadow: 0 0 14px rgba(255,0,220,0.15); }
  .kanban-card.needs-update { border: 1.5px dashed rgba(255,180,0,0.35); }
  .kanban-card.dragging { opacity: 0.45; transform: rotate(1.5deg) scale(1.03); box-shadow: 0 10px 28px rgba(255,0,220,0.3); }
  .kanban-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .kanban-card .company { font-weight: 700; font-size: 13px; color: #f0e6ff; }
  .kanban-card .role { font-size: 12px; color: rgba(255,160,255,0.5); margin-top: 2px; line-height: 1.3; }
  .kanban-card .loc { font-size: 11px; color: rgba(255,160,255,0.3); margin-top: 2px; }
  .kanban-card .badges { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .kanban-badge { border-radius: 5px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .update-pill { font-size: 9px; font-weight: 700; background: rgba(255,180,0,0.15); color: #ffb347; border-radius: 4px; padding: 1px 5px; }
  #archive-col { min-width: 185px; flex-shrink: 0; }
  #archive-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: rgba(255,160,255,0.25); text-transform: uppercase; margin-bottom: 10px; padding-left: 4px; }
  .archive-section { background: rgba(255,0,220,0.03); border-radius: 10px; padding: 10px; border: 2px dashed transparent; margin-bottom: 10px; transition: all 0.14s; }
  .archive-section.drag-over { border-color: var(--col-dot); background: var(--col-bg); }
  .archive-header { display: flex; align-items: center; gap: 6px; }
  .archive-card { background: rgba(20,0,35,0.7); border-radius: 8px; padding: 8px 10px; cursor: grab; margin-top: 6px; border: 1px solid rgba(255,0,220,0.1); opacity: 0.65; user-select: none; }
  .archive-card .company { font-weight: 600; font-size: 12px; color: #f0e6ff; }
  .archive-card .role { font-size: 11px; color: rgba(255,160,255,0.4); }
  .contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .contact-card { background: rgba(255,0,220,0.04); border-radius: 12px; padding: 18px 20px; border: 1px solid rgba(255,0,220,0.15); }
  .contact-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .contact-card .name { font-weight: 700; font-size: 15px; color: #f0e6ff; }
  .contact-card .role { font-size: 13px; color: rgba(255,160,255,0.5); margin-top: 2px; }
  .contact-card .email { font-size: 12px; color: #ff6bff; margin-top: 8px; }
  .contact-card .notes { font-size: 12px; color: rgba(255,160,255,0.5); margin-top: 6px; line-height: 1.5; }
  .contact-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,160,255,0.4); margin-bottom: 10px; }
  .section-label.overdue { color: #ff6b6b; }
  .followup-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .followup-row { background: rgba(255,0,220,0.04); border-radius: 10px; padding: 14px 16px; border: 1px solid rgba(255,0,220,0.12); display: flex; gap: 12px; align-items: center; }
  .followup-row.overdue { border-color: rgba(255,80,80,0.3); }
  .followup-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #ff00dd; flex-shrink: 0; }
  .followup-row .text { flex: 1; font-size: 14px; font-weight: 500; color: #f0e6ff; }
  .followup-row .text.done { text-decoration: line-through; color: rgba(255,160,255,0.3); }
  .followup-row .sub { font-size: 12px; color: rgba(255,160,255,0.4); margin-top: 3px; }
  .followup-row .date { font-size: 12px; color: rgba(255,160,255,0.3); white-space: nowrap; }
  .followup-row .date.overdue { color: #ff6b6b; }
  .interview-list { display: flex; flex-direction: column; gap: 10px; }
  .interview-row { background: rgba(255,0,220,0.04); border-radius: 12px; padding: 16px 20px; border: 1px solid rgba(255,0,220,0.15); }
  .interview-row-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
  .interview-row .round { font-weight: 700; font-size: 15px; color: #f0e6ff; }
  .interview-row .company { font-size: 13px; color: rgba(255,160,255,0.5); margin-top: 2px; }
  .interview-row .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .outcome-badge { font-size: 12px; font-weight: 700; border-radius: 6px; padding: 3px 10px; }
  .interview-notes { font-size: 13px; color: rgba(255,160,255,0.6); margin-top: 10px; line-height: 1.6; background: rgba(255,0,220,0.05); border-radius: 8px; padding: 10px 12px; border: 1px solid rgba(255,0,220,0.1); }
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state .msg { font-size: 16px; font-weight: 600; color: rgba(255,160,255,0.4); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,0,20,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-box { background: #120020; border: 1px solid rgba(255,0,220,0.3); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; box-shadow: 0 0 60px rgba(255,0,220,0.2); }
  .modal-box.wide { max-width: 680px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h3 { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; color: #ff6bff; text-shadow: 0 0 10px rgba(255,107,255,0.4); }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: rgba(255,160,255,0.4); line-height: 1; font-family: inherit; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  #detail-overlay { position: fixed; inset: 0; background: rgba(10,0,20,0.6); z-index: 90; display: flex; justify-content: flex-end; }
  #detail-panel { background: #120020; width: 100%; max-width: 420px; height: 100%; overflow-y: auto; padding: 28px; box-shadow: -8px 0 40px rgba(255,0,220,0.15); border-left: 1px solid rgba(255,0,220,0.2); }
  #detail-panel h2 { font-family: 'Playfair Display', serif; font-size: 20px; margin: 0; color: #ff6bff; }
  .detail-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,160,255,0.4); margin-bottom: 8px; }
  .detail-item { background: rgba(255,0,220,0.05); border: 1px solid rgba(255,0,220,0.1); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .detail-item .round { font-weight: 600; font-size: 13px; color: #f0e6ff; }
  .detail-item .sub { font-size: 12px; color: rgba(255,160,255,0.5); margin-top: 4px; }
  #detail-panel .warn-box { background: rgba(255,180,0,0.07); border: 1px solid rgba(255,180,0,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #ffb347; }
  .email-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .email-draft { background: rgba(255,0,220,0.04); border: 1.5px solid rgba(255,0,220,0.2); border-radius: 12px; padding: 20px; margin-bottom: 18px; font-family: Georgia, serif; font-size: 14px; line-height: 1.85; color: #f0e6ff; white-space: pre-wrap; min-height: 180px; }
  .generating-center { text-align: center; padding: 48px 20px; }
  .generating-center .icon { font-size: 40px; margin-bottom: 16px; }
  .generating-center .title { font-size: 16px; font-weight: 600; color: #ff6bff; margin-bottom: 8px; }
  .generating-center .sub { font-size: 13px; color: rgba(255,160,255,0.4); margin-bottom: 20px; }
  .dots { display: flex; gap: 6px; justify-content: center; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff00dd; animation: dotpulse 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotpulse { 0%,100%{transform:scale(0.6);opacity:0.35} 50%{transform:scale(1.2);opacity:1} }
  .hidden { display: none !important; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .flex-gap { display: flex; gap: 8px; flex-wrap: wrap; }
  .notes-box { background: rgba(255,0,220,0.04); border: 1px solid rgba(255,0,220,0.1); border-radius: 8px; padding: 14px; font-size: 13px; color: rgba(255,160,255,0.6); line-height: 1.6; margin-bottom: 16px; }
  .loc-text { font-size: 12px; color: rgba(255,160,255,0.4); }
  .followup-check-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .followup-check-row input { accent-color: #ff00dd; }
  .followup-check-row span { font-size: 13px; color: rgba(255,160,255,0.7); }
  .followup-check-row span.done { text-decoration: line-through; color: rgba(255,160,255,0.3); }
  .followup-check-row .date-sm { font-size: 11px; color: rgba(255,160,255,0.3); margin-left: auto; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,0,220,0.05); }
  ::-webkit-scrollbar-thumb { background: rgba(255,0,220,0.25); border-radius: 3px; }
</style>
</head>
<body>
<div id="header"><div id="header-inner"><div id="header-top"><div><h1>✨ Job Search HQ</h1><p>Your personal career pipeline</p></div><div id="stats"><div class="stat-box"><div class="val" id="stat-active">0</div><div class="lbl">Active</div></div><div class="stat-box"><div class="val alert" id="stat-due">0</div><div class="lbl">Due Today</div></div><div class="stat-box"><div class="val alert" id="stat-update">0</div><div class="lbl">Needs Update</div></div><button id="email-btn" onclick="openEmailGen()">✉ AI Email Draft</button></div></div><div id="tabs"><button class="tab-btn active" onclick="switchTab('pipeline',this)">Pipeline</button><button class="tab-btn" onclick="switchTab('kanban',this)">🗂 Kanban</button><button class="tab-btn" onclick="switchTab('contacts',this)">Contacts</button><button class="tab-btn" onclick="switchTab('followups',this)">Follow-ups</button><button class="tab-btn" onclick="switchTab('interviews',this)">Interviews</button></div></div></div>
<div id="content"><div id="tab-pipeline"><div class="toolbar"><input class="inp" id="search-input" placeholder="Search…" oninput="renderPipeline()" style="max-width:260px"/><select class="inp" id="status-filter" onchange="renderPipeline()" style="max-width:160px"><option value="All">All Statuses</option></select><button class="btn-primary" style="margin-left:auto" onclick="openJobModal(null)">+ Add Job</button></div><div class="pipeline-list" id="pipeline-list"></div></div><div id="tab-kanban" class="hidden"><div id="kanban-hint"><span>💡</span><span>Dashed border = needs updating. Click to edit.</span></div><p id="kanban-tip">🖱 Drag cards to update status · Click to view details</p><div id="kanban-board"></div></div><div id="tab-contacts" class="hidden"><div class="toolbar" style="justify-content:flex-end"><button class="btn-primary" onclick="openContactModal(null)">+ Add Contact</button></div><div class="contacts-grid" id="contacts-grid"></div></div><div id="tab-followups" class="hidden"><div class="flex-between" style="margin-bottom:20px"><button class="btn-secondary" onclick="openEmailGen()">✨ Draft Follow-up Email</button><button class="btn-primary" onclick="openFollowupModal(null)">+ Add Task</button></div><div id="followups-content"></div></div><div id="tab-interviews" class="hidden"><div class="toolbar" style="justify-content:flex-end"><button class="btn-primary" onclick="openInterviewModal(null)">+ Log Interview</button></div><div class="interview-list" id="interview-list"></div></div></div>
<div id="detail-overlay" class="hidden" onclick="if(event.target===this)closeDetail()"><div id="detail-panel"></div></div>
<div id="modal-overlay" class="hidden" onclick="if(event.target===this)closeModal()"><div class="modal-box" id="modal-box"><div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">×</button></div><div id="modal-body"></div></div></div>
<script>
const STATUSES=["Wishlist","Applied","Phone Screen","Interviewing","Offer","Rejected","Withdrawn"];
const SC={"Wishlist":{bg:"rgba(100,0,200,0.15)",text:"#bf7fff",dot:"#9b59ff",col:"rgba(100,0,200,0.12)"},"Applied":{bg:"rgba(255,150,0,0.12)",text:"#ffb347",dot:"#ff9500",col:"rgba(255,150,0,0.1)"},"Phone Screen":{bg:"rgba(0,180,255,0.12)",text:"#5dd8ff",dot:"#00b4ff",col:"rgba(0,180,255,0.1)"},"Interviewing":{bg:"rgba(0,255,150,0.1)",text:"#00ffaa",dot:"#00e599",col:"rgba(0,255,150,0.08)"},"Offer":{bg:"rgba(255,0,220,0.15)",text:"#ff6bff",dot:"#ff00dd",col:"rgba(255,0,220,0.12)"},"Rejected":{bg:"rgba(255,50,50,0.1)",text:"#ff6b6b",dot:"#ff3333",col:"rgba(255,50,50,0.08)"},"Withdrawn":{bg:"rgba(100,100,100,0.1)",text:"#999",dot:"#666",col:"rgba(100,100,100,0.08)"}};

 of mind. Culture praised by Anna and Kelly. Global team: North America 60-70%, EMEA, APAC, Japan. Key intro: Kerry Huskey — Revenue Strategy & Ops for Federal/Public Sector, Atlanta. Julie will make intro. Follow up in 3-4 weeks. Zoom call with Julie Robinson Apr 21 10:30-10:55am.",dateAdded:"2026-04-15",contacts:[102,103],followUps:[]},{id:107,company:"Honeywell",title:"Sr Director Strategic Planning (LinkedIn alert)",status:"Phone Screen",location:"Atlanta, GA",salary:"",url:"",notes:"LinkedIn job alert received Apr 15. No application yet.",dateAdded:"2026-04-15",contacts:[],followUps:[]}];

function loadData(){let db={jobs:[],contacts:[],followUps:[],interviews:[]};try{const s=localStorage.getItem("jobcrm_neon_v1");if(s)db=JSON.parse(s);}catch{}const ji=new Set(db.jobs.map(j=>j.id));SJ.forEach(j=>{if(!ji.has(j.id))db.jobs.push({...j});});const ci=new Set(db.contacts.map(c=>c.id));SC2.forEach(c=>{if(!ci.has(c.id))db.contacts.push({...c});});const fi=new Set(db.followUps.map(f=>f.id));SF.forEach(f=>{if(!fi.has(f.id))db.followUps.push({...f});});db.contacts.forEach(c=>{if(c.id===102&&!c.email)c.email="julie.robinson@workday.com";if(c.id===103&&c.name==="Carrie Husky"){c.name="Kerry Huskey";c.email="kerry.huskey@workday.com";}});db.jobs.forEach(j=>{if(j.id===103&&j.status==="Phone Screen"){j.status="Rejected";j.notes="Rejected: Director, Customer Success Account Management (Apr 20). Rejected: Experience Lead, AI Acceleration Program (Apr 15).";j.title="Multiple roles applied";}});return db;}
let DB=loadData();
function saveData(){try{localStorage.setItem("jobcrm_neon_v1",JSON.stringify(DB));}catch{}}
function today(){return new Date().toISOString().split("T")[0];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function sbHTML(s){const c=SC[s]||SC["Wishlist"];return `<span class="status-badge" style="background:${c.bg};color:${c.text}"><span class="status-dot" style="background:${c.dot}"></span>${esc(s)}</span>`;}
function updateStats(){const t=today();document.getElementById("stat-active").textContent=DB.jobs.filter(j=>!["Rejected","Withdrawn"].includes(j.status)).length;document.getElementById("stat-due").textContent=DB.followUps.filter(f=>!f.done&&f.dueDate<=t).length;document.getElementById("stat-update").textContent=DB.jobs.filter(j=>j.title==="TBD").length;}
const TM={pipeline:"tab-pipeline",kanban:"tab-kanban",contacts:"tab-contacts",followups:"tab-followups",interviews:"tab-interviews"};let ct="pipeline";
function switchTab(n,b){Object.values(TM).forEach(id=>document.getElementById(id).classList.add("hidden"));document.getElementById(TM[n]).classList.remove("hidden");document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");ct=n;renderTab(n);}
function renderTab(n){if(n==="pipeline")renderPipeline();else if(n==="kanban")renderKanban();else if(n==="contacts")renderContacts();else if(n==="followups")renderFollowups();else if(n==="interviews")renderInterviews();}
function renderAll(){updateStats();renderTab(ct);}
function initSF(){const s=document.getElementById("status-filter");STATUSES.forEach(x=>{const o=document.createElement("option");o.value=x;o.textContent=x;s.appendChild(o);});}
function renderPipeline(){const q=document.getElementById("search-input").value.toLowerCase();const f=document.getElementById("status-filter").value;const l=document.getElementById("pipeline-list");const jobs=DB.jobs.filter(j=>(f==="All"||j.status===f)&&(!q||j.company.toLowerCase().includes(q)||j.title.toLowerCase().includes(q)));if(!jobs.length){l.innerHTML='<div class="empty-state"><div class="icon">📋</div><div class="msg">No jobs found</div></div>';return;}l.innerHTML=jobs.map(job=>{const nu=job.title==="TBD";const it=DB.interviews.filter(i=>i.jobId===job.id).length;const fu=DB.followUps.filter(f=>f.jobId===job.id&&!f.done).length;const tg=[it?`<span class="pipeline-tag tag-pink">${it} interview${it>1?"s":""}</span>`:"",fu?`<span class="pipeline-tag tag-amber">${fu} task${fu>1?"s":""}</span>`:""].filter(Boolean).join("");return `<div class="pipeline-row${nu?" needs-update":""}" onclick="openDetail(${job.id})"><div style="flex:1;min-width:160px"><div class="co-name">${esc(job.company)}</div><div class="co-title${nu?" warn":""}">${nu?"⚠ Role title needed":esc(job.title)}</div></div>${sbHTML(job.status)}${job.location?`<span class="loc-text">📍 ${esc(job.location)}</span>":""}${job.salary?`<span style="font-size:12px;color:#ffb347">${esc(job.salary)}</span>":""}<div class="pipeline-tags">${tg}</div><div class="pipeline-actions" onclick="event.stopPropagation()"><button class="btn-primary btn-sm" onclick="openJobModal(${job.id})">Edit</button><button class="btn-danger" onclick="deleteJob(${job.id})">Delete</button></div></div>`;}).join("");}
function deleteJob(id){if(!confirm("Delete?"))return;DB.jobs=DB.jobs.filter(j=>j.id!==id);saveData();renderAll();}
let did=null;
function renderKanban(){const b=document.getElementById("kanban-board");const ac=["Wishlist","Applied","Phone Screen","Interviewing","Offer"];const ar=["Rejected","Withdrawn"];let h=ac.map(s=>{const c=SC[s];const js=DB.jobs.filter(j=>j.status===s);const cd=js.length?js.map(j=>kCard(j)).join(""):'<div class="kanban-empty">Drop here</div>';return `<div class="kanban-col" style="--col-dot:${c.dot};--col-bg:${c.col}" ondragover="kDO(event,this)" ondrop="kDrop(event,'${esc(s)}')" ondragleave="kDL(this)"><div class="kanban-col-header"><div class="kanban-col-title"><span style="width:7px;height:7px;border-radius:50%;background:${c.dot};display:inline-block"></span><span style="color:${c.text}">${esc(s.toUpperCase())}</span></div><span class="kanban-col-count">${js.length}</span></div><div class="kanban-cards">${cd}</div></div>`;}).join("");let ah='<div id="archive-col"><div id="archive-label">Archive</div>';ar.forEach(s=>{const c=SC[s];const js=DB.jobs.filter(j=>j.status===s);const cd=js.map(j=>`<div class="archive-card" draggable="true" ondragstart="kDS(event,${j.id})" ondragend="kDE()" onclick="openDetail(${j.id})"><div class="company">${esc(j.company)}</div><div class="role">${esc(j.title==="TBD"?"Role TBD":j.title)}</div></div>`).join("");ah+=`<div class="archive-section" style="--col-dot:${c.dot};--col-bg:${c.col}" ondragover="kDO(event,this)" ondrop="kDrop(event,'${esc(s)}')" ondragleave="kDL(this)"><div class="archive-header"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block"></span><span style="font-size:11px;font-weight:700;color:${c.text};margin-left:6px">${esc(s.toUpperCase())}</span><span style="font-size:11px;color:rgba(255,160,255,0.25);margin-left:auto">${js.length}</span></div>${cd||'<div style="font-size:11px;color:rgba(255,160,255,0.2);font-style:italic;text-align:center;padding:8px 0">Drop here</div>'}</div>`;});ah+='</div>';b.innerHTML=h+ah;}
function kCard(job){const nu=job.title==="TBD";const fu=DB.followUps.filter(f=>f.jobId===job.id&&!f.done).length;const it=DB.interviews.filter(i=>i.jobId===job.id).length;const bd=[it?`<span class="kanban-badge tag-pink">${it} int.</span>`:"",fu?`<span class="kanban-badge tag-amber">${fu} task${fu>1?"s":""}</span>`:""].filter(Boolean).join("");return `<div class="kanban-card${nu?" needs-update":""}" draggable="true" ondragstart="kDS(event,${job.id})" ondragend="kDE()" onclick="openDetail(${job.id})" id="kcard-${job.id}"><div class="kanban-card-header"><div class="company">${esc(job.company)}</div>${nu?'<span class="update-pill">UPDATE</span>':""}</div>${!nu?`<div class="role">${esc(job.title)}</div>`:""}${job.location?`<div class="loc">📍 ${esc(job.location)}</div>":""}${bd?`<div class="badges">${bd}</div>":""}</div>`;}
function kDS(e,id){did=id;e.dataTransfer.effectAllowed="move";setTimeout(()=>{const el=document.getElementById("kcard-"+id);if(el)el.classList.add("dragging");},0);}
function kDE(){did=null;document.querySelectorAll(".kanban-card.dragging").forEach(el=>el.classList.remove("dragging"));}
function kDO(e,col){e.preventDefault();col.classList.add("drag-over");}
function kDL(col){col.classList.remove("drag-over");}
function kDrop(e,s){e.preventDefault();if(did==null)return;const job=DB.jobs.find(j=>j.id===did);if(job)job.status=s;saveData();renderAll();document.querySelectorAll(".kanban-col.drag-over,.archive-section.drag-over").forEach(el=>el.classList.remove("drag-over"));}
function renderContacts(){const g=document.getElementById("contacts-grid");if(!DB.contacts.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="icon">🤝</div><div class="msg">No contacts yet</div></div>';return;}g.innerHTML=DB.contacts.map(c=>{const rj=DB.jobs.filter(j=>(j.contacts||[]).includes(c.id));const tg=rj.map(j=>`<span class="pipeline-tag tag-pink">${esc(j.company)}</span>`).join("");return `<div class="contact-card"><div class="contact-card-header"><div><div class="name">${esc(c.name)}</div><div class="role">${esc(c.role)}${c.company?` @ ${esc(c.company)}":""}</div></div><div class="flex-gap"><button class="btn-icon" onclick="openEmailGen()">✉</button><button class="btn-secondary btn-sm" onclick="openContactModal(${c.id})">Edit</button></div></div>${c.email?`<div class="email">✉ ${esc(c.email)}</div>":""}${c.notes?`<div class="notes">${esc(c.notes)}</div>":""}${tg?`<div class="contact-tags">${tg}</div>":""}</div>`;}).join("");}
function renderFollowups(){const t=today();const co=document.getElementById("followups-content");if(!DB.followUps.length){co.innerHTML='<div class="empty-state"><div class="icon">✅</div><div class="msg">No follow-up tasks yet</div></div>';return;}const sec=[{l:"Overdue",i:DB.followUps.filter(f=>!f.done&&f.dueDate<t)},{l:"Today",i:DB.followUps.filter(f=>!f.done&&f.dueDate===t)},{l:"Upcoming",i:DB.followUps.filter(f=>!f.done&&f.dueDate>t)},{l:"Done",i:DB.followUps.filter(f=>f.done)}].filter(s=>s.i.length);co.innerHTML=sec.map(s=>{const rows=s.i.map(f=>{const job=DB.jobs.find(j=>j.id===f.jobId);const io=s.l==="Overdue";return `<div class="followup-row${io?" overdue":""}"><input type="checkbox" ${f.done?"checked":""} onchange="toggleFU(${f.id})"><div style="flex:1"><div class="text${f.done?" done":""}">${esc(f.text)}</div>${job?`<div class="sub">${esc(job.company)}</div>`:""}</div><span class="date${io?" overdue":""}">${esc(f.dueDate)}</span><button class="btn-icon" onclick="openEmailGen()">✉</button><button class="btn-secondary btn-sm" onclick="openFollowupModal(${f.id})">Edit</button></div>`;}).join("");return `<div class="section-label${s.l==="Overdue"?" overdue":""}">${s.l}</div><div class="followup-list">${rows}</div>`;}).join("");}
function toggleFU(id){const f=DB.followUps.find(x=>x.id===id);if(f)f.done=!f.done;saveData();renderAll();}
function renderInterviews(){const l=document.getElementById("interview-list");if(!DB.interviews.length){l.innerHTML='<div class="empty-state"><div class="icon">🎤</div><div class="msg">No interviews logged yet</div></div>';return;}const oc={Passed:"#00ffaa",Failed:"#ff6b6b",Pending:"#ffb347"};l.innerHTML=[...DB.interviews].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(i=>{const job=DB.jobs.find(j=>j.id===i.jobId);const c=oc[i.outcome]||"#999";return `<div class="interview-row"><div class="interview-row-top"><div><div class="round">${esc(i.round)}</div>${job?`<div class="company">${esc(job.company)}</div>":""}</div><div class="meta"><span class="outcome-badge" style="color:${c};background:${c}18">${esc(i.outcome)}</span><span style="font-size:12px;color:rgba(255,160,255,0.3)">${esc(i.date)}</span><button class="btn-icon" onclick="openEmailGen()">✉ Thank You</button><button class="btn-secondary btn-sm" onclick="openInterviewModal(${i.id})">Edit</button></div></div>${i.notes?`<div class="interview-notes">${esc(i.notes)}</div>":""}</div>`;}).join("");}
function openDetail(id){const job=DB.jobs.find(j=>j.id===id);if(!job)return;const it=DB.interviews.filter(i=>i.jobId===job.id);const fu=DB.followUps.filter(f=>f.jobId===job.id);const co=DB.contacts.filter(c=>(job.contacts||[]).includes(c.id));const nu=job.title==="TBD";let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2>${esc(job.company)}</h2><button class="modal-close" onclick="closeDetail()">×</button></div>`;if(nu)h+='<div class="warn-box">✏️ Click <strong>Edit Job</strong> to fill in details.</div>';h+=`<div style="font-size:14px;color:rgba(255,160,255,0.6);margin-bottom:4px">${nu?"Role TBD":esc(job.title)}</div><div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">${sbHTML(job.status)}${job.location?`<span class="loc-text">📍 ${esc(job.location)}</span>":""}${job.salary?`<span style="font-size:12px;color:#ffb347">${esc(job.salary)}</span>":""}</div>`;if(job.notes)h+=`<div class="notes-box">${esc(job.notes)}</div>`;if(it.length){h+='<div class="detail-section-label">Interviews</div>';h+=it.map(i=>`<div class="detail-item"><div class="round">${esc(i.round)} <span style="color:rgba(255,160,255,0.4)">· ${esc(i.date)}</span></div>${i.notes?`<div class="sub">${esc(i.notes)}</div>":""}</div>`).join("");h+='<div style="margin-bottom:12px"></div>';}if(fu.length){h+='<div class="detail-section-label">Follow-ups</div>';h+=fu.map(f=>`<div class="followup-check-row"><input type="checkbox" ${f.done?"checked":""} onchange="toggleFU(${f.id});openDetail(${job.id})"><span class="${f.done?"done":""}">${esc(f.text)}</span><span class="date-sm">${esc(f.dueDate)}</span></div>`).join("");h+='<div style="margin-bottom:12px"></div>';}if(co.length){h+='<div class="detail-section-label">Contacts</div>';h+=co.map(c=>`<div class="detail-item"><div class="round">${esc(c.name)}</div><div class="sub">${esc(c.role)}${c.email?` · ${esc(c.email)}":""}</div></div>`).join("");h+='<div style="margin-bottom:12px"></div>';}h+=`<div class="flex-gap" style="margin-top:8px"><button class="btn-primary" onclick="closeDetail();openJobModal(${job.id})">Edit Job</button><button class="btn-secondary" onclick="openEmailGen()">✉ Draft Email</button><button class="btn-secondary" onclick="openFollowupModal(null,${job.id})">+ Task</button><button class="btn-secondary" onclick="openInterviewModal(null,${job.id})">+ Interview</button></div>`;document.getElementById("detail-panel").innerHTML=h;document.getElementById("detail-overlay").classList.remove("hidden");}
function closeDetail(){document.getElementById("detail-overlay").classList.add("hidden");}
function showModal(t,b,w=false){document.getElementById("modal-title").textContent=t;document.getElementById("modal-body").innerHTML=b;document.getElementById("modal-box").className="modal-box"+(w?" wide":"");document.getElementById("modal-overlay").classList.remove("hidden");}
function closeModal(){document.getElementById("modal-overlay").classList.add("hidden");}
function fHTML(l,i){return `<div class="field"><label>${l}</label>${i}</div>`;}
function openJobModal(id){const job=id?DB.jobs.find(j=>j.id===id):null;const v=job||{};const so=STATUSES.map(s=>`<option${(v.status||"Wishlist")===s?" selected":""}>${s}</option>`).join("");const b=`${fHTML("Company",`<input class="inp" id="f-co" value="${esc(v.company||"")}"/>`)}${fHTML("Job Title",`<input class="inp" id="f-ti" value="${v.title==="TBD"?"":esc(v.title||"")}" placeholder="e.g. Senior PM…"/>`)}${fHTML("Status",`<select class="inp" id="f-st">${so}</select>`)}${fHTML("Location",`<input class="inp" id="f-lo" value="${esc(v.location||"")}"/>`)}${fHTML("Salary",`<input class="inp" id="f-sa" value="${esc(v.salary||"")}"/>`)}${fHTML("URL",`<input class="inp" id="f-ur" value="${esc(v.url||"")}"/>`)}${fHTML("Notes",`<textarea class="inp" id="f-no" style="min-height:80px">${esc(v.notes||"")}</textarea>`)}<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveJob(${id||"null"})">Save</button></div>`;showModal(job?`Edit — ${job.company}`:"Add Job",b);}
function saveJob(id){const co=document.getElementById("f-co").value.trim();if(!co)return alert("Company required");const f={company:co,title:document.getElementById("f-ti").value.trim()||"TBD",status:document.getElementById("f-st").value,location:document.getElementById("f-lo").value.trim(),salary:document.getElementById("f-sa").value.trim(),url:document.getElementById("f-ur").value.trim(),notes:document.getElementById("f-no").value.trim()};if(id){const job=DB.jobs.find(j=>j.id===id);Object.assign(job,f);}else DB.jobs.push({...f,id:Date.now(),dateAdded:today(),contacts:[],followUps:[]});saveData();closeModal();renderAll();}
function openContactModal(id){const c=id?DB.contacts.find(x=>x.id===id):null;const v=c||{};const b=`${fHTML("Name",`<input class="inp" id="f-na" value="${esc(v.name||"")}"/>`)}${fHTML("Company",`<input class="inp" id="f-co" value="${esc(v.company||"")}"/>`)}${fHTML("Role",`<input class="inp" id="f-ro" value="${esc(v.role||"")}"/>`)}${fHTML("Email",`<input class="inp" id="f-em" value="${esc(v.email||"")}"/>`)}${fHTML("LinkedIn",`<input class="inp" id="f-li" value="${esc(v.linkedin||"")}"/>`)}${fHTML("Notes",`<textarea class="inp" id="f-no" style="min-height:70px">${esc(v.notes||"")}</textarea>`)}<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveContact(${id||"null"})">${c?"Save":"Add Contact"}</button></div>`;showModal(c?"Edit Contact":"Add Contact",b);}
function saveContact(id){const n=document.getElementById("f-na").value.trim();if(!n)return alert("Name required");const f={name:n,company:document.getElementById("f-co").value.trim(),role:document.getElementById("f-ro").value.trim(),email:document.getElementById("f-em").value.trim(),linkedin:document.getElementById("f-li").value.trim(),notes:document.getElementById("f-no").value.trim()};if(id){const c=DB.contacts.find(x=>x.id===id);Object.assign(c,f);}else DB.contacts.push({...f,id:Date.now(),jobIds:[]});saveData();closeModal();renderAll();}
function openFollowupModal(id,pj){const f=id?DB.followUps.find(x=>x.id===id):null;const v=f||{};const jo='<option value="">— No job —</option>'+DB.jobs.map(j=>`<option value="${j.id}"${(v.jobId||pj)===j.id?" selected":""}>${esc(j.company)}</option>`).join("");const b=`${fHTML("Task",`<input class="inp" id="f-tx" value="${esc(v.text||"")}"/>`)}${fHTML("Due Date",`<input type="date" class="inp" id="f-dd" value="${esc(v.dueDate||"")}"/>`)}${fHTML("Related Job",`<select class="inp" id="f-jb">${jo}</select>`)}<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveFU(${id||"null"})">Save</button></div>`;showModal(f?"Edit Task":"Add Task",b);}
function saveFU(id){const t=document.getElementById("f-tx").value.trim();if(!t)return alert("Task required");const f={text:t,dueDate:document.getElementById("f-dd").value,jobId:parseInt(document.getElementById("f-jb").value)||null};if(id){const fu=DB.followUps.find(x=>x.id===id);Object.assign(fu,f);}else DB.followUps.push({...f,id:Date.now(),done:false});saveData();closeModal();renderAll();}
function openInterviewModal(id,pj){const i=id?DB.interviews.find(x=>x.id===id):null;const v=i||{};const jo='<option value="">— Select job —</option>'+DB.jobs.map(j=>`<option value="${j.id}"${(v.jobId||pj)===j.id?" selected":""}>${esc(j.company)}</option>`).join("");const oo=["Pending","Passed","Failed"].map(o=>`<option${(v.outcome||"Pending")===o?" selected":""}>${o}</option>`).join("");const b=`${fHTML("Related Job",`<select class="inp" id="f-jb">${jo}</select>`)}${fHTML("Round / Type",`<input class="inp" id="f-ro" value="${esc(v.round||"")}"/>`)}${fHTML("Date",`<input type="date" class="inp" id="f-da" value="${esc(v.date||"")}"/>`)}${fHTML("Outcome",`<select class="inp" id="f-ou">${oo}</select>`)}${fHTML("Notes",`<textarea class="inp" id="f-no" style="min-height:80px">${esc(v.notes||"")}</textarea>`)}<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveInt(${id||"null"})">Save</button></div>`;showModal(i?"Edit Interview":"Log Interview",b);}
function saveInt(id){const f={jobId:parseInt(document.getElementById("f-jb").value)||null,round:document.getElementById("f-ro").value.trim(),date:document.getElementById("f-da").value,outcome:document.getElementById("f-ou").value,notes:document.getElementById("f-no").value.trim()};if(id){const i=DB.interviews.find(x=>x.id===id);Object.assign(i,f);}else DB.interviews.push({...f,id:Date.now()});saveData();closeModal();renderAll();}
function openEmailGen(){const ET=[{v:"thank_you",l:"Thank You (Post-Interview)"},{v:"follow_up",l:"Follow-Up (No Response)"},{v:"status_check",l:"Status Check-In"},{v:"networking",l:"Networking Outreach"},{v:"withdraw",l:"Withdraw Application"},{v:"negotiate",l:"Offer Negotiation"}];const jo='<option value="">— No job —</option>'+DB.jobs.map(j=>`<option value="${j.id}">${esc(j.company)}${j.title&&j.title!=="TBD"?` · ${esc(j.title)}":""}</option>`).join("");const co='<option value="">— No contact —</option>'+DB.contacts.map(c=>`<option value="${c.id}">${esc(c.name)} (${esc(c.role)}${c.company?` @ ${esc(c.company)}":""}</option>`).join("");const to=ET.map(t=>`<option value="${t.v}">${t.l}</option>`).join("");const b=`<div id="es-c"><div class="email-grid">${fHTML("Email Type",`<select class="inp" id="e-ty">${to}</select>`)}${fHTML("Related Job",`<select class="inp" id="e-jb">${jo}</select>`)}</div>${fHTML("Send To",`<select class="inp" id="e-co">${co}</select>`)}${fHTML("Extra Context",`<textarea class="inp" id="e-cx" style="min-height:70px" placeholder="e.g. Great Zoom call today"></textarea>`)}<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="genEmail()">✨ Generate Draft</button></div></div><div id="es-g" class="hidden"><div class="generating-center"><div class="icon">✍️</div><div class="title">Drafting your email…</div><div class="sub">Claude is crafting a personalized draft</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div><div id="es-r" class="hidden"><div class="email-draft" id="e-dt"></div><div style="display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap"><button class="btn-secondary" onclick="document.getElementById('es-r').classList.add('hidden');document.getElementById('es-c').classList.remove('hidden')">← Adjust</button><div style="display:flex;gap:10px"><button class="btn-secondary" style="color:rgba(255,160,255,0.4)" onclick="closeModal()">Close</button><button class="btn-primary" id="cp-btn" onclick="copyDraft()">Copy to Clipboard</button></div></div></div>`;showModal("✉ AI Email Draft Generator",b,true);}
async function genEmail(){const jid=parseInt(document.getElementById("e-jb").value)||null;const cid=parseInt(document.getElementById("e-co").value)||null;const et=document.getElementById("e-ty").value;const ex=document.getElementById("e-cx").value.trim();const job=DB.jobs.find(j=>j.id===jid);const con=DB.contacts.find(c=>c.id===cid);const EL={thank_you:"Thank You (Post-Interview)",follow_up:"Follow-Up (No Response)",status_check:"Status Check-In",networking:"Networking Outreach",withdraw:"Withdraw Application",negotiate:"Offer Negotiation"};document.getElementById("es-c").classList.add("hidden");document.getElementById("es-g").classList.remove("hidden");const jc=job?[`Company: ${job.company}`,`Role: ${job.title}`,`Status: ${job.status}`,job.location?`Location: ${job.location}`:"",job.notes?`Notes: ${job.notes}`:""].filter(Boolean).join("\n"):"No specific job";const ci=con?`Contact: ${con.name}, ${con.role}${con.company?", "+con.company:""}${con.email?", "+con.email:""}`:"No specific contact";const p=`You are a career coach. Write a concise, warm, authentic "${EL[et]||et}" email.\n\nJob Context:\n${jc}\n\n${ci}\n\n${ex?"Additional context: "+ex:""}\n\nWrite a complete email: Subject, greeting, body (under 150 words), sign-off. Use [Your Name]. Format: Subject: ...\n\n[body]`;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:p}]})});const d=await r.json();document.getElementById("e-dt").textContent=(d.content||[]).map(b=>b.text||"").join("")||"No response.";}catch{document.getElementById("e-dt").textContent="Something went wrong. Try again.";}document.getElementById("es-g").classList.add("hidden");document.getElementById("es-r").classList.remove("hidden");}
function copyDraft(){navigator.clipboard.writeText(document.getElementById("e-dt").textContent).then(()=>{const b=document.getElementById("cp-btn");b.textContent="✓ Copied!";b.style.background="linear-gradient(135deg,#00bb77,#00ff99)";setTimeout(()=>{b.textContent="Copy to Clipboard";b.style.background="";},2000);});}
initSF();renderAll();
document.querySelector('.tab-btn[onclick*="kanban"]').click();
</script>
